name: Build Bundle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read
  issues: write

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm ci
      - name: Build (bundle)
        run: npm run build --silent -- --mode=bundle
      - name: Debug: environment
        run: |
          node -v
          npm -v
          echo "Working dir: $(pwd)"
          echo "Listing repo root:"
          ls -la
      - name: Debug: dist contents
        run: |
          if [ -d dist ]; then ls -la dist; else echo "dist dir missing"; fi
      - name: Verify bundle exists
        run: |
          if [ ! -f dist/bundle.js ]; then echo "dist/bundle.js missing" && ls -la . && exit 1; fi
      - name: Add build label
        if: github.event_name == 'pull_request'
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: build:success
