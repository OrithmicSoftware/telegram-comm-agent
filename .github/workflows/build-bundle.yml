name: Build Bundle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write
  issues: write

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm ci
      - name: Build (bundle)
        run: npm run build --silent -- --mode=bundle
      - name: Debug: environment
        run: |
          node -v
          npm -v
          echo "Working dir: $(pwd)"
          echo "Listing repo root:"
          ls -la
      - name: Debug: dist contents
        run: |
          if [ -d dist ]; then ls -la dist; else echo "dist dir missing"; fi
      - name: Verify bundle exists
        run: |
          if [ ! -f dist/bundle.js ]; then echo "dist/bundle.js missing" && ls -la . && exit 1; fi
      - name: Create build tag
        if: success()
        run: |
          set -e
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          TAG=build-success-${SHORT_SHA}
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Build succeeded for $GITHUB_SHA"
          git push origin "$TAG"
      - name: Add build label (PRs)
        if: github.event_name == 'pull_request' && success()
        uses: actions-ecosystem/action-add-labels@v1
        with:
          labels: build:success
