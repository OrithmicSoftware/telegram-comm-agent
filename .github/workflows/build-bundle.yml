name: Build Bundle

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm ci
      - name: Build (bundle)
        run: npm run build --silent -- --mode=bundle
      - name: Debug: environment
        run: |
          node -v
          npm -v
          echo "Working dir: $(pwd)"
          echo "Listing repo root:"
          ls -la
      - name: Debug: .build contents
        run: |
          if [ -d .build ]; then ls -la .build; else echo ".build dir missing"; fi
      - name: Verify bundle exists
        run: |
          if [ ! -f .build/bundle.js ]; then echo ".build/bundle.js missing" && ls -la . && exit 1; fi
