name: Build Bundle

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install
        run: npm ci
      - name: Build (bundle)
        run: npm run build --silent -- --mode=bundle
      - name: Verify bundle exists
        run: |
          if [ ! -f dist/bundle.js ]; then echo "dist/bundle.js missing" && exit 1; fi
